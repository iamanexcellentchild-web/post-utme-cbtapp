{% extends "base.html" %}

{% block title %}Profile - UNILAG CBT{% endblock %}

{% block content %}
<div class="profile-container">
    <h2>Your Profile</h2>
    
    <div class="profile-form">
        <form method="POST" action="{{ url_for('auth.update_profile') }}">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name or '' }}">
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="{{ current_user.username }}" disabled>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}" required>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" name="department" value="{{ current_user.department or '' }}">
            </div>

            <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
